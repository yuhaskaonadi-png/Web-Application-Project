<!DOCTYPE html>
<html lang="en">
<head>

    <title>Music Genre Catalog</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 90%;
        }

        th, td {
            border: 1px solid black;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: lightblue;
        }

        img {
            width: 80px;
            height: auto;

</head>
